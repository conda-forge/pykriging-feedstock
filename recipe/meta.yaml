{% set name = "pyKriging" %}
{% set version = "0.2.0" %}
{% set sha256 = "bc09725bcb049446fa5fbd200a943ca1d2a4a42b2fe3cb20cfd304ab0bc662cc" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/capaulson/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 2
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - scipy
    - numpy
    - dill
    - matplotlib-base
    - inspyred

test:
  requires:
    - python {{ python_min }}
  imports:
    - pyKriging

about:
  home: https://github.com/capulson/pyKriging
  license: GLP-2.0
  license_family: GPL
  license_file: LICENSE
  summary: 'User Friendly Python Kriging Toolbox!'

extra:
  recipe-maintainers:
    - CJ-Wright
